<svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular ring -->
  <circle cx="11" cy="11" r="9" stroke="#000000" stroke-width="2" fill="none"/>
  
  <!-- Top arrow pointing right (clockwise) -->
  <path d="M 16 4 L 18 6 L 16 8 Z" fill="#000000"/>
  
  <!-- Bottom arrow pointing left (clockwise) -->
  <path d="M 6 18 L 4 16 L 6 14 Z" fill="#000000"/>
  
  <!-- TF Ligature - single entity with fills -->
  <!-- Top horizontal bar (T crossbar) -->
  <rect x="7.5" y="7" width="7" height="1.5" fill="#000000"/>
  
  <!-- Main vertical stem -->
  <rect x="10" y="7" width="1.5" height="9" fill="#000000"/>
  
  <!-- Middle arm extending right (F middle bar) -->
  <rect x="10" y="11.5" width="3.5" height="1.5" fill="#000000"/>
</svg>
